<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2jyymium // Eklentiler</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e28;
    --border: rgba(255,255,255,0.07);
    --text: #e2e8f0;
    --text-muted: #718096;
    --accent: #63b3ed;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 40px;
    height: 100vh;
    overflow-y: auto;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }

  .header-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(99,179,237,0.2), rgba(99,179,237,0.05));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: var(--accent);
  }

  .title {
    font-size: 24px;
    font-weight: 700;
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .ext-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .ext-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .ext-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .ext-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .ext-info { flex: 1; }
  .ext-name { font-size: 15px; font-weight: 600; }
  .ext-version { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .ext-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    flex: 1;
  }

  .ext-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .action-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .action-btn:hover { background: var(--surface2); }

  .no-ext {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🧩</div>
  <div>
    <div class="title">Eklentiler</div>
    <div class="subtitle">Yüklü Chromium uzantılarını görüntüleyin</div>
  </div>
</div>

<div class="grid" id="ext-grid">
  <div class="no-ext">Yükleniyor...</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  const grid = document.getElementById('ext-grid');
  
  try {
    const extensions = await window.electronAPI.getExtensions();
    
    if (!extensions || extensions.length === 0) {
      grid.innerHTML = '<div class="no-ext">Şu anda yüklü hiçbir eklenti bulunmuyor.<br><br>Eklenti kurmak için ana dizine bir Chromium uzantısı koyup index.js üzerinden yüklemeniz gerekmektedir.</div>';
      return;
    }

    grid.innerHTML = '';
    extensions.forEach(ext => {
      const card = document.createElement('div');
      card.className = 'ext-card';
      card.innerHTML = `
        <div class="ext-header">
          <div class="ext-icon">🧩</div>
          <div class="ext-info">
            <div class="ext-name">${ext.name || 'Bilinmeyen Eklenti'}</div>
            <div class="ext-version">Sürüm: ${ext.version || '1.0'}</div>
          </div>
        </div>
        <div class="ext-desc">${ext.description || 'Açıklama bulunmuyor.'}</div>
        <div class="ext-footer">
          <button class="action-btn" onclick="openFolder('${ext.path.replace(/\\/g, '\\\\')}')">Klasörü Aç</button>
          <div style="font-size:11px;color:#68d391;">Aktif ✅</div>
        </div>
      `;
      grid.appendChild(card);
    });
  } catch (err) {
    grid.innerHTML = `<div class="no-ext">Eklentiler yüklenirken hata oluştu:<br>${err.message}</div>`;
  }
});

function openFolder(path) {
  if (window.electronAPI && window.electronAPI.openExtensionFolder) {
    window.electronAPI.openExtensionFolder(path);
  }
}
</script>

</body>
</html>
